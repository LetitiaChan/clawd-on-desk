name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 同 tag 重推时不并发争抢 release job；不取消正在跑的 build job，避免 artifact 中途丢失。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run fetch:sidecars -- --target windows-x64,windows-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:win:all
      - run: npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/latest.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run fetch:sidecars -- --target darwin-x64,darwin-arm64
      - run: node scripts/verify-sidecar-binaries.js prebuild:mac
      - run: npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run fetch:sidecars -- --target linux-x64
      - run: node scripts/verify-sidecar-binaries.js prebuild:linux
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify release notes file exists
        run: |
          NOTES="docs/releases/release-${{ github.ref_name }}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Release notes file '$NOTES' is missing. Per project-continuity rule §3 step 3, this file must exist before pushing the tag."
            exit 1
          fi
          echo "Release notes found at $NOTES"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: docs/releases/release-${{ github.ref_name }}.md
          fail_on_unmatched_files: false
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
