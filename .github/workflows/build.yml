name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 同 tag 重推时不并发争抢 release job；不取消正在跑的 build job，避免 artifact 中途丢失。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            sidecar-targets: "windows-x64,windows-arm64"
            verify-arg: "prebuild:win:all"
            builder-flag: "--win"
            artifact-name: windows-installer
            artifact-path: |
              dist/*.exe
              dist/latest.yml
          - os: macos-latest
            platform: mac
            sidecar-targets: "darwin-x64,darwin-arm64"
            verify-arg: "prebuild:mac"
            builder-flag: "--mac"
            artifact-name: mac-installer
            artifact-path: |
              dist/*.dmg
              dist/latest-mac.yml
          - os: ubuntu-latest
            platform: linux
            sidecar-targets: "linux-x64"
            verify-arg: "prebuild:linux"
            builder-flag: "--linux"
            artifact-name: linux-installer
            artifact-path: |
              dist/*.AppImage
              dist/*.deb
              dist/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run fetch:sidecars -- --target ${{ matrix.sidecar-targets }}
      - run: node scripts/verify-sidecar-binaries.js ${{ matrix.verify-arg }}
      - run: npx electron-builder ${{ matrix.builder-flag }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify release notes file exists
        run: |
          NOTES="docs/releases/release-${{ github.ref_name }}.md"
          if [ ! -f "$NOTES" ]; then
            echo "::error::Release notes file '$NOTES' is missing. Per project-continuity rule §3 step 3, this file must exist before pushing the tag."
            exit 1
          fi
          echo "Release notes found at $NOTES"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: docs/releases/release-${{ github.ref_name }}.md
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
